name: my_structure
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Routing
  get: ^4.6.5

  # Local Storage (get_storage — faster than SharedPreferences, matches Remitium pattern)
  get_storage: ^2.1.1

  # HTTP Client (matches Remitium's ApiMethod which uses http package)
  http: ^1.2.0

  # Logging (typed per-class logger, matches Remitium)
  logger: ^2.4.0

  # Fonts
  google_fonts: ^6.2.1

  # UI / Widgets
  pinput: 6.0.2                  # For OTP / Pin Code
  table_calendar: 3.2.0           # For calendar widget
  intl: 0.20.2                    # For date formatting
  cached_network_image: ^3.2.3    # For network images in avatar or cards
  flutter_svg: ^2.1.1             # For SVG icons
  url_launcher: ^6.1.11           # For opening external URLs
  fluttertoast: 9.0.0             # Optional: for toast messages
  shimmer: ^3.0.0
  skeletonizer:

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #

